<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <title>StudySprint</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <span class="logo">StudySprint</span>
      <div class="nav-actions" id="nav-actions" style="display: none">
        <span id="nav-user"></span>
        <button id="btn-logout">Odjava</button>
      </div>
    </nav>

    <div id="app">
      <!-- LOGIN / REGISTRACIJA -->
      <div id="login-view" class="view active">
        <div id="login-form">
          <h2>Prijava</h2>
          <div class="form-group">
            <label for="input-username">Email</label>
            <input id="input-username" type="email" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="input-password">Geslo</label>
            <input id="input-password" type="password" autocomplete="current-password" />
          </div>
          <button id="btn-login" class="btn btn-primary" style="width: 100%">Prijava</button>
          <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted)">
            Nimaš računa? <a href="#" id="btn-show-register" style="color: var(--accent)">Registracija</a>
          </p>
        </div>

        <div id="register-form" style="display: none">
          <h2>Registracija</h2>
          <div class="form-group">
            <label for="reg-name">Ime</label>
            <input id="reg-name" type="text" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input id="reg-email" type="email" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="reg-password">Geslo</label>
            <input id="reg-password" type="password" autocomplete="new-password" />
          </div>
          <button id="btn-register" class="btn btn-primary" style="width: 100%">Registracija</button>
          <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted)">
            Že imaš račun? <a href="#" id="btn-show-login" style="color: var(--accent)">Prijava</a>
          </p>
        </div>
      </div>

      <!-- GOALS -->
      <div id="goals-view" class="view">
        <div class="section-header">
          <h2>Cilji</h2>
          <input id="search-goals" type="search" placeholder="Iskanje... (Ctrl+F)" />
          <button id="btn-add-goal" class="btn btn-primary btn-sm">+ Nov cilj (Ctrl+N)</button>
        </div>
        <div id="goals-list" class="item-list"></div>
      </div>

      <!-- TASKS -->
      <div id="tasks-view" class="view">
        <button id="btn-back">← Nazaj na cilje</button>
        <div class="section-header">
          <h2 id="tasks-title">Naloge</h2>
          <input id="search-tasks" type="search" placeholder="Iskanje... (Ctrl+F)" />
          <button id="btn-add-task" class="btn btn-primary btn-sm">+ Nova naloga (Ctrl+N)</button>
        </div>
        <div id="tasks-list" class="item-list"></div>
      </div>
    </div>

    <!-- MODAL -->
    <div id="modal-overlay">
      <div id="modal">
        <h3 id="modal-title">Nov vnos</h3>
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn" style="background: var(--border)">Prekliči</button>
          <button id="modal-save" class="btn btn-primary">Shrani</button>
        </div>
      </div>
    </div>

    <button id="btn-voice">🎤</button>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/voice.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('SW registriran:', reg.scope))
            .catch((err) => console.error('SW napaka:', err));
        });
      }
    </script>
  </body>
</html>
